name: CI
on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*.*.*"]
permissions:
  contents: write
  packages: write
env:
  IMAGE: ghcr.io/kubevoip/kubevoip-rtpengine
jobs:
  build:
    name: build ${{ matrix.platform }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4.1.0
      - uses: docker/login-action@v4.2.0
        if: startsWith(github.ref, 'refs/tags/')
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=ci-${GITHUB_SHA::12}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max

  smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4.1.0
      - uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile
          load: true
          tags: kubevoip-rtpengine:smoke
          cache-from: type=gha,scope=smoke
          cache-to: type=gha,scope=smoke,mode=max
      - run: docker run --rm --entrypoint /usr/bin/rtpengine kubevoip-rtpengine:smoke --version

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, smoke]
    runs-on: ubuntu-24.04
    steps:
      - uses: docker/setup-buildx-action@v4.1.0
      - uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:${GITHUB_REF_NAME}" \
            "${IMAGE}:${GITHUB_REF_NAME}-amd64" \
            "${IMAGE}:${GITHUB_REF_NAME}-arm64"
          docker buildx imagetools inspect "${IMAGE}:${GITHUB_REF_NAME}"
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes
